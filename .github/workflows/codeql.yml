name: "Teal Security Scan"

on: [push, pull_request]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup CodeQL CLI
        run: |
          wget https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip codeql-linux64.zip -d $HOME
          echo "$HOME/codeql" >> $GITHUB_PATH
          echo "CODEQL_ALLOW_INSTALLATION_ANYWHERE=true" >> $GITHUB_ENV

      - name: Download Private Packs
        run: |
          echo "${{ secrets.GH_PACK_TOKEN }}" | $HOME/codeql/codeql pack download argimirodelpozo/teal-all --github-auth-stdin
          echo "${{ secrets.GH_PACK_TOKEN }}" | $HOME/codeql/codeql pack download argimirodelpozo/teal-sec-guide-detections --github-auth-stdin

      - name: Clone and Guerilla Patch
        run: |
          git clone -b feat/add-gabe-security-examples https://github.com/Argimirodelpozo/codeql-TEAL.git $HOME/codeql-teal-repo
          
          mkdir -p $HOME/codeql-teal-repo/sec-guide-detections/asset-close-to/
          
          # PROFESSIONAL QUERY: Using the InnerTransactionField class from your library
          cat <<EOF > $HOME/codeql-teal-repo/sec-guide-detections/asset-close-to/assetCloseTo.ql
          /**
           * @name Missing AssetCloseTo Validation
           * @description Finding inner transactions that set an amount but don't clear the remainder, which can lead to balance draining.
           * @kind problem
           * @problem.severity critical
           * @id teal/missing-itxn-asset-close-to
           */
          import codeql.teal.ast.AST

          from InnerTransactionField f, InnerTransactionStart start, InnerTransactionEnd end
          where 
            f.getItxnField() = "Amount" and
            f.contributesToItxn(start, end) and
            // Look for a missing Close check within the same transaction boundaries
            not exists(InnerTransactionField close |
              close.contributesToItxn(start, end) and
              (close.getItxnField() = "AssetCloseTo" or close.getItxnField() = "CloseRemainderTo")
            )
          select f, "Critical: This inner transaction sets an Amount but lacks an AssetCloseTo/CloseRemainderTo check."
          EOF

      - name: Build Extractor
        run: |
          cd $HOME/codeql-teal-repo/teal/scripts
          chmod +x create-extractor-pack.sh
          ./create-extractor-pack.sh
          
      - name: Create Database
        run: |
          $HOME/codeql/codeql database create teal-db \
            --language=teal \
            --source-root=./contracts \
            --search-path=$HOME/codeql-teal-repo/teal/extractor-pack

      - name: Run Analysis
        run: |
          $HOME/codeql/codeql database analyze teal-db \
            $HOME/codeql-teal-repo/sec-guide-detections/asset-close-to/assetCloseTo.ql \
            --format=sarif-latest \
            --output=results.sarif \
            --search-path=$HOME/codeql-teal-repo/teal/extractor-pack:$HOME/codeql-teal-repo/teal

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: "/language:teal"
